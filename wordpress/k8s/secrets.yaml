# =============================================================================
# WordPress DB Secrets – Managed by External Secrets Operator
# =============================================================================
# In production, this file is NOT applied manually.
# Instead, the External Secrets Operator syncs credentials from
# AWS Secrets Manager into this Kubernetes Secret automatically.
#
# AWS Secret: prueba-it/rds/wordpress-credentials
# Contains: username, password, host, port, dbname
#
# To install External Secrets Operator:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
# =============================================================================

# --- ExternalSecret resource (syncs from AWS Secrets Manager → K8s Secret) ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wordpress-db-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: wordpress-db-secrets
    creationPolicy: Owner
  data:
  - secretKey: db-host
    remoteRef:
      key: SECRET_NAME_PLACEHOLDER
      property: host
  - secretKey: db-user
    remoteRef:
      key: SECRET_NAME_PLACEHOLDER
      property: username
  - secretKey: db-password
    remoteRef:
      key: SECRET_NAME_PLACEHOLDER
      property: password
  - secretKey: db-name
    remoteRef:
      key: SECRET_NAME_PLACEHOLDER
      property: dbname

---
# --- ClusterSecretStore (connects to AWS Secrets Manager) ---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-3
