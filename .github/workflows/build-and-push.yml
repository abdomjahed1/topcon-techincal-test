name: WordPress CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: mi-ecr-de-prueba
  EKS_CLUSTER: prueba-it-eks

jobs:
  # -----------------------------------------------
  # 1. BUILD & PUSH – Docker image to ECR
  # -----------------------------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set image metadata
      id: meta
      run: |
        echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "ecr_url=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}" >> $GITHUB_OUTPUT

    - name: Build Docker image from wordpress/Dockerfile
      run: |
        docker build \
          -f wordpress/Dockerfile \
          -t ${{ steps.meta.outputs.ecr_url }}:latest \
          -t ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.tag }} \
          wordpress/

    - name: Push image to ECR
      run: |
        docker push ${{ steps.meta.outputs.ecr_url }}:latest
        docker push ${{ steps.meta.outputs.ecr_url }}:${{ steps.meta.outputs.tag }}

  # -----------------------------------------------
  # 4. DEPLOY TO STAGING
  # -----------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Create staging namespace
      run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

    - name: Update image tag in deployment
      run: |
        cd wordpress/k8s
        sed -i "s|image:.*|image: ${{ secrets.ECR_URL }}:${{ needs.build.outputs.image_tag }}|" deployment.yaml

    - name: Deploy to staging
      run: kubectl apply -f wordpress/k8s/ -n staging

    - name: Wait for rollout
      run: kubectl rollout status deployment/wordpress -n staging --timeout=300s

    - name: Verify deployment health
      run: |
        kubectl get pods -n staging -l app=wordpress
        kubectl get svc -n staging

  # -----------------------------------------------
  # 5. DEPLOY TO PRODUCTION (manual approval)
  # -----------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # GitHub Environment with required reviewers
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

    - name: Create production namespace
      run: kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

    - name: Update image tag in deployment
      run: |
        cd wordpress/k8s
        sed -i "s|image:.*|image: ${{ secrets.ECR_URL }}:${{ needs.build.outputs.image_tag }}|" deployment.yaml

    - name: Deploy to production
      run: kubectl apply -f wordpress/k8s/ -n production

    - name: Wait for rollout
      run: kubectl rollout status deployment/wordpress -n production --timeout=300s

    - name: Verify deployment health
      run: |
        kubectl get pods -n production -l app=wordpress
        kubectl get svc -n production
